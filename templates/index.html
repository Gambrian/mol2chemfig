<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMILES to Chemfig 实验室</title>
    <!-- 使用特定版本的 Tailwind Play CDN 并添加配置以减少警告 -->
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    // 自定义配置
                }
            }
        }
    </script>
    <!-- 引入 svg-pan-zoom 库 -->
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        .code-font {
            font-family: 'Fira Code', 'Courier New', monospace;
        }
        #rdkit-preview-img {
            max-width: 100%;
            max-height: 240px;
            object-fit: contain;
        }
        #tikz-preview-container svg {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        /* 视口容器：增大高度以获得更大版面 */
        .viewport-container {
            min-height: 500px;
            position: relative;
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: inset 0 2px 10px 0 rgba(0, 0, 0, 0.05);
        }
        .rdkit-viewport {
            min-height: 280px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 min-h-screen py-8 px-4">
    <div class="max-w-[1400px] mx-auto">
        <!-- 标题栏 -->
        <header class="mb-8 text-center relative">
            <div class="absolute right-0 top-1/2 -translate-y-1/2">
                <a href="/mol" class="group text-sm font-bold text-slate-400 hover:text-indigo-600 transition-all flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100">
                    切换到 Molfile 转换
                    <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </a>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">
                SMILES to <span class="text-indigo-600">Chemfig</span> 实验室
            </h1>
            <p class="text-slate-500 font-medium">快速转换、实时对比、高清本地渲染</p>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <!-- 左侧：输入与代码 (5 columns) -->
            <div class="xl:col-span-5 space-y-6">
                <!-- 1. 输入 -->
                <div class="glass-card rounded-3xl shadow-xl shadow-indigo-100/50 p-8">
                    <label class="block text-sm font-bold text-slate-700 mb-3 ml-1">SMILES 字符串</label>
                    <div class="flex gap-3">
                        <input type="text" id="smiles-input" 
                               placeholder="例如: CC(=O)Oc1ccccc1C(=O)O (阿司匹林)"
                               class="flex-1 px-5 py-3 bg-white/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all text-slate-700 shadow-sm">
                        <button id="convert-btn" 
                                class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-bold transition-all shadow-lg shadow-indigo-200 active:scale-95 flex items-center gap-2">
                            <span>转换</span>
                        </button>
                    </div>
                </div>

                <!-- 2. 代码 -->
                <div class="glass-card rounded-3xl shadow-xl shadow-indigo-100/50 p-8">
                    <div class="flex items-center justify-between mb-4">
                        <label class="block text-sm font-bold text-slate-700 ml-1">Chemfig 代码</label>
                        <button id="copy-btn" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 px-4 py-2 bg-indigo-50 rounded-xl transition-all active:scale-95">
                            复制代码
                        </button>
                    </div>
                    <textarea id="chemfig-textarea" 
                              class="w-full h-64 p-5 code-font text-sm bg-slate-900 text-indigo-100 rounded-2xl border-none focus:ring-4 focus:ring-indigo-500/20 outline-none resize-none leading-relaxed shadow-inner"
                              placeholder="\chemfig{...}"></textarea>
                    
                    <!-- RDKit 预览：移至代码下方，作为辅助预览 -->
                    <div class="mt-8 pt-6 border-t border-slate-100">
                        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 bg-blue-400 rounded-full"></span>
                            RDKit 结构参考
                        </h2>
                        <div id="rdkit-viewport" class="rdkit-viewport bg-white/40 rounded-2xl flex items-center justify-center p-4 border border-white/50 relative overflow-hidden">
                            <div id="rdkit-placeholder" class="text-slate-300 text-xs text-center font-medium">等待输入...</div>
                            <img id="rdkit-preview-img" class="hidden drop-shadow-sm" alt="RDKit Preview">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：大版面 TikZJax 渲染 (7 columns) -->
            <div class="xl:col-span-7">
                <div class="glass-card rounded-[2.5rem] shadow-2xl shadow-indigo-100/50 p-8 h-full flex flex-col">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-orange-500 rounded-xl">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            </div>
                            <div>
                                <h2 class="text-lg font-bold text-slate-800">TikZJax 高清渲染</h2>
                                <p class="text-xs text-slate-400 font-medium">交互式矢量预览</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button id="reset-zoom-btn" title="重置视角" class="p-2.5 hover:bg-slate-100 rounded-xl transition-all group border border-slate-100 shadow-sm active:scale-95">
                                <svg class="w-5 h-5 text-slate-500 group-hover:text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                            </button>
                            <button id="refresh-btn" title="重新渲染" class="p-2.5 hover:bg-slate-100 rounded-xl transition-all group border border-slate-100 shadow-sm active:scale-95">
                                <svg class="w-5 h-5 text-slate-500 group-hover:text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            </button>
                        </div>
                    </div>

                    <!-- 核心渲染区域：高度自适应布局 -->
                    <div id="tikz-viewport" class="viewport-container border border-slate-100 overflow-hidden flex-1">
                        <div id="tikz-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-300 gap-4">
                            <svg class="w-16 h-16 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            <span class="text-sm font-medium">等待生成化学结构...</span>
                        </div>
                        <div id="tikz-preview-container" class="hidden w-full h-full cursor-move"></div>
                        
                        <!-- 增强加载器 -->
                        <div id="preview-loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-md flex items-center justify-center z-20">
                            <div class="flex flex-col items-center">
                                <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin shadow-inner"></div>
                                <span class="text-xs text-indigo-600 mt-4 font-bold uppercase tracking-widest">Rendering SVG</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div class="flex items-center gap-4">
                            <span class="flex items-center gap-1.5 text-[11px] font-bold text-slate-500 uppercase">
                                <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
                                Local Node Engine
                            </span>
                            <div class="h-4 w-px bg-slate-200"></div>
                            <span class="text-[11px] text-slate-400 font-medium italic">滚轮缩放 • 拖拽移动 • 自动居中</span>
                        </div>
                        <span class="text-[10px] font-bold text-slate-300">v2.0 PRO</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const smilesInput = document.getElementById('smiles-input');
        const convertBtn = document.getElementById('convert-btn');
        const chemfigTextarea = document.getElementById('chemfig-textarea');
        const rdkitImg = document.getElementById('rdkit-preview-img');
        const rdkitPlaceholder = document.getElementById('rdkit-placeholder');
        const tikzContainer = document.getElementById('tikz-preview-container');
        const tikzPlaceholder = document.getElementById('tikz-placeholder');
        const previewLoader = document.getElementById('preview-loader');
        const copyBtn = document.getElementById('copy-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const resetZoomBtn = document.getElementById('reset-zoom-btn');

        let debounceTimer;
        let panZoomInstance = null;

        // 1. 从 SMILES 转换为 Chemfig
        convertBtn.addEventListener('click', async () => {
            const smiles = smilesInput.value.trim();
            if (!smiles) return;

            setLoading(true);
            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ smiles }),
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    chemfigTextarea.value = data.chemfig;
                    // 更新 RDKit 分子预览
                    if (data.preview_url) {
                        rdkitImg.src = data.preview_url;
                        rdkitImg.classList.remove('hidden');
                        rdkitPlaceholder.classList.add('hidden');
                    }
                    // 触发 TikZJax 渲染
                    renderTikZ(data.chemfig);
                } else {
                    console.error('Server Error:', data);
                    alert(`转换失败: ${data.error || '未知错误'}`);
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                alert('无法连接到服务器，请检查后端服务是否启动');
            } finally {
                setLoading(false);
            }
        });

        // 2. 监听 textarea 变动实时渲染
        chemfigTextarea.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                renderTikZ(chemfigTextarea.value);
            }, 800);
        });

        // 3. 使用本地 Node-TikZJax 进行渲染
        async function renderTikZ(code) {
            if (!code.trim()) {
                tikzContainer.classList.add('hidden');
                tikzPlaceholder.classList.remove('hidden');
                if (panZoomInstance) {
                    panZoomInstance.destroy();
                    panZoomInstance = null;
                }
                return;
            }

            showLoader();
            
            try {
                const response = await fetch('/render_local', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code.trim() }),
                });
                
                const data = await response.json();
                
                if (response.ok && data.svg) {
                    // 销毁旧实例
                    if (panZoomInstance) {
                        panZoomInstance.destroy();
                        panZoomInstance = null;
                    }

                    tikzContainer.innerHTML = data.svg;
                    tikzContainer.classList.remove('hidden');
                    tikzPlaceholder.classList.add('hidden');
                    
                    // 初始化缩放移动
                    const svgElement = tikzContainer.querySelector('svg');
                    if (svgElement) {
                        // 设置一个初始大小以便库计算
                        svgElement.setAttribute('width', '100%');
                        svgElement.setAttribute('height', '100%');
                        
                        panZoomInstance = svgPanZoom(svgElement, {
                            zoomEnabled: true,
                            controlIconsEnabled: false,
                            fit: true,
                            center: true,
                            minZoom: 0.1,
                            maxZoom: 10,
                            zoomScaleSensitivity: 0.3
                        });
                    }
                    console.log('Local render completed');
                } else {
                    console.error('Render error:', data.error);
                    const errorLog = data.stderr || data.error || '未知错误';
                    tikzContainer.innerHTML = `
                        <div class="flex flex-col h-full p-6">
                            <div class="bg-red-50 text-red-600 p-6 rounded-2xl border border-red-100 flex-1 overflow-hidden flex flex-col">
                                <div class="flex items-center gap-3 mb-4">
                                    <svg class="w-8 h-8 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                    <h3 class="font-bold text-lg">渲染引擎报错 (Backend Logs)</h3>
                                </div>
                                
                                <div class="flex-1 bg-slate-900 rounded-xl p-4 overflow-auto shadow-inner mb-4 group relative">
                                    <div class="absolute top-2 right-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest opacity-50">Stderr Stream</div>
                                    <pre class="text-xs text-red-400 code-font leading-relaxed whitespace-pre-wrap">${errorLog}</pre>
                                </div>

                                <div class="text-xs text-slate-500 bg-white/50 p-4 rounded-xl border border-red-50">
                                    <div class="flex items-start gap-2">
                                        <span class="text-lg mt-[-2px]">💡</span>
                                        <div>
                                            <p class="font-bold mb-1 text-slate-700">为什么会报错？</p>
                                            <p class="leading-relaxed">此渲染引擎基于精简版 WebAssembly TikZJax 运行。它仅支持标准的 Chemfig 语法。如果您使用了复杂的 LaTeX 宏、特殊字体、或者自定义的绘图指令，引擎将无法处理并抛出上述错误。</p>
                                            <p class="mt-1 font-medium text-indigo-600/80 italic">* 这通常意味着代码在完整 LaTeX 环境下可能没问题，但当前预览环境无法承载。</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    tikzContainer.classList.remove('hidden');
                    tikzPlaceholder.classList.add('hidden');
                }
            } catch (error) {
                console.error('Fetch error:', error);
                tikzContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-red-500 gap-4 p-8">
                        <svg class="w-16 h-16 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                        <div class="text-center">
                            <p class="font-bold text-lg">无法连接渲染服务</p>
                            <p class="text-sm opacity-60">请检查后端 Flask 服务是否正在运行</p>
                        </div>
                    </div>
                `;
                tikzContainer.classList.remove('hidden');
                tikzPlaceholder.classList.add('hidden');
            } finally {
                hideLoader();
            }
        }

        // UI 辅助
        function setLoading(l) {
            convertBtn.disabled = l;
            convertBtn.textContent = l ? '...' : '转换';
        }

        function showLoader() { previewLoader.classList.remove('hidden'); }
        function hideLoader() { previewLoader.classList.add('hidden'); }

        // 复制功能
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(chemfigTextarea.value).then(() => {
                const old = copyBtn.textContent;
                copyBtn.textContent = '已复制';
                setTimeout(() => copyBtn.textContent = old, 2000);
            });
        });

        refreshBtn.addEventListener('click', () => renderTikZ(chemfigTextarea.value));

        resetZoomBtn.addEventListener('click', () => {
            if (panZoomInstance) {
                panZoomInstance.reset();
                panZoomInstance.center();
            }
        });

        // 回车转换
        smilesInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') convertBtn.click();
        });
    </script>
</body>
</html>
